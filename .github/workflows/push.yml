name: CI Main Commit

on:
  push:
    branches:
      - '**'

jobs:
  style-check:
    name: Verify Coding Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Execute Lint
        run: npm run lint --if-present

  test-coverage:
    name: Verify Test Coverage and Execution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Execute tests with coverage (>90%)
        run: npm test
      - name: Execute project in background to validate start
        run: npm start & sleep 3

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t moviez-api .

  test-image:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t moviez-api .
      - name: Run Docker Container
        run: docker run -d -p 8080:8080 moviez-api
      - name: Verify Container is Running
        run: sleep 5 && curl -f http://localhost:8080/api/movies

  publish-image:
    name: Publish to DockerHub
    runs-on: ubuntu-latest
    needs: [build-image, test-image]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/baseline'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/moviez:latest
